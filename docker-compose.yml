name: c-hr

# Infra services pulled in whole via `include:` — postgres + redis have no
# dev overrides and run identically across environments.
include:
  - ./services/postgres/docker-compose.yml
  - ./services/redis/docker-compose.yml

# Backend uses `extends:` (not `include:`) so docker-compose.dev.yml can
# layer hot-reload + dev command on top via `-f`. Compose's `include`
# does not propagate `-f` overrides into included service definitions.
services:
  backend:
    extends:
      file: ./services/backend/docker-compose.yml
      service: backend
