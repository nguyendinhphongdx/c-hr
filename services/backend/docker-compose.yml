name: c-hr-backend

# Standalone definition of the backend container. Pulled into the root
# compose via `include:`. Not meant to run alone (depends_on postgres +
# redis which live in sibling service compose files) — start via the
# root file instead.
services:
  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: c-hr-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Single source of truth for BE config. The `environment:` block
    # below only overrides values that differ inside the compose
    # network (container hostnames, production NODE_ENV).
    env_file:
      - ../../apps/backend/.env
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/c_hr
      REDIS_HOST: redis
    ports:
      - '8000:8000'
    networks:
      - c-hr

networks:
  c-hr:
    name: c-hr
    driver: bridge
