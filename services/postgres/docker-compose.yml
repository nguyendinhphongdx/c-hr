name: c-hr-postgres

services:
  postgres:
    image: postgres:16-alpine
    container_name: c-hr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-c_hr}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-c_hr}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - c-hr

volumes:
  postgres_data:
    name: c-hr-postgres-data

networks:
  c-hr:
    name: c-hr
    driver: bridge
