name: c-hr-redis

services:
  redis:
    image: redis:7-alpine
    container_name: c-hr-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - c-hr

volumes:
  redis_data:
    name: c-hr-redis-data

networks:
  c-hr:
    name: c-hr
    driver: bridge
